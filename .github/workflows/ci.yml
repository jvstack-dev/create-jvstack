name: CI

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Install
        run: npm ci
      
      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Scaffold template (non-interactive)
        run: node dist/index.js ci-app a2r6bw --skip-git

      - name: Lint scaffolded app
        working-directory: ci-app
        run: npm run lint

      - name: Build scaffolded app
        working-directory: ci-app
        run: npm run build

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish
